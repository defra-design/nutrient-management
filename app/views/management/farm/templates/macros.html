{% macro navCard(heading, description, href) %}
  <li class="govuk-grid-column-one-third card-group__item">
    <div class="card card--clickable">
      <h2 class="govuk-heading-m card__heading">
        <a class="govuk-link card__link govuk-link--no-visited-state" href="{{ href }}">{{ heading }}</a>
      </h2>
      <p class="govuk-body card__description">{{ description }}</p>
    </div>
  </li>
{% endmacro %}
