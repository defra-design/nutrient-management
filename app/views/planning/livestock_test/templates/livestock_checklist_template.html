<div class="check-answers margin-bottom-forty">
  <ul class="govuk-task-list">
    <li class="govuk-task-list__item govuk-task-list__item--with-link">
      <div class="govuk-task-list__name-and-hint">
        <span class="strong">Type</span>
      </div>
      <div class="govuk-task-list__status"></div>
    </li>

    {% for animal in data.ltestLivestock %}
      {% if animal.type == livestock_type %}
        <li class="govuk-task-list__item govuk-task-list__item--with-link">
          <div class="govuk-task-list__name-and-hint">
            <a class="govuk-link govuk-task-list__link" href="update_test_livestock?reference={{animal.reference}}">
              {{animal.name | capitalize}}
            </a>
          </div>
          <div class="govuk-task-list__status">
            Completed
          </div>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</div>
